<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – White House Cafe</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🏠</div>
    <h1>White House Cafe</h1>
    <h2>Admin Login</h2>
    <div id="login-error" class="alert alert-error hidden"></div>
    <div class="form-row">
      <label>Email</label>
      <input id="email" type="email" placeholder="admin@whitehousecafe.com" />
    </div>
    <div class="form-row">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>
    <button id="login-btn" class="btn-primary full-width">Login</button>
    
    <p class="auth-hint" style="margin-top:.5rem">
      New admin? <a href="/register.html" style="color:var(--primary)">Register here</a>
    </p>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) window.location.href = '/admin.html';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/admin.html';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
        }
      } catch {
        errEl.textContent = 'Server error. Please try again.';
        errEl.classList.remove('hidden');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  </script>
</body>
</html>
